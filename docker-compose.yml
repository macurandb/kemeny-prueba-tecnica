services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: assessment
      POSTGRES_DB: taskmanager
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: assessment
      DB_NAME: taskmanager
      JWT_SECRET: dev-secret
      LLM_PROVIDER: mock
      # LLM_PROVIDER: openai
      # LLM_PROVIDER: anthropic
      # OPENAI_API_KEY: ""
      # ANTHROPIC_API_KEY: ""
      CORS_ORIGIN: http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
